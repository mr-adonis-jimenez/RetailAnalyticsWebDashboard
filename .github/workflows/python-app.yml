name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install black flake8 isort pylint
      - run: black --check --diff .
      - run: flake8 . --max-line-length=100 --exclude=.venv,__pycache__,migrations --ignore=E501,W503
      - run: isort --check-only --diff .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-flask
      - name: Run tests with coverage
        run: pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=60 -v
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
        continue-on-error: true

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit pip-audit
      - run: bandit -r . -x .venv,tests,migrations --severity-level medium -q
      - run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-62
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t retail-analytics:test .
      - name: Verify image starts
        run: docker run --rm -d --name test_container -e FLASK_ENV=testing retail-analytics:test || true
        continue-on-error: true
